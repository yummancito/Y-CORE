<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Y-core</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 100vw;
      height: 100vh;
      background: transparent;
      color: #f0f6fc;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      overflow: hidden;
      user-select: none;
      -webkit-app-region: drag;
      gap: 14px;
    }

    .logo-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      filter: drop-shadow(0 0 16px rgba(255,255,255,0.18));
    }
    .logo-wrap svg {
      width: 64px;
      height: 64px;
    }

    .diamond {
      opacity: 0;
      animation: buildIn 0.55s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }
    .diamond:nth-child(1) { animation-delay: 0s; }
    .diamond:nth-child(2) { animation-delay: 0.12s; }
    .diamond:nth-child(3) { animation-delay: 0.24s; }
    .diamond:nth-child(4) { animation-delay: 0.36s; }

    @keyframes buildIn {
      0% { opacity: 0; }
      40% { opacity: 0.4; }
      100% { opacity: 1; }
    }

    .title {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.18em;
      color: #ffffff;
      opacity: 0;
      animation: fadeUp 0.6s ease-out 0.6s forwards;
    }

    .loading-text {
      font-size: 10px;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.05em;
      opacity: 0;
      animation: fadeUp 0.5s ease-out 0.8s forwards, pulse 1.8s ease-in-out 1.3s infinite;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.6; }
    }

    body.fade-out {
      opacity: 0;
      transition: opacity 0.35s ease;
    }
  </style>
</head>
<body>
  <div class="logo-wrap">
    <svg width="64" height="64" viewBox="12.5 14.5 96 68" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect class="diamond" x="50" y="10" width="28" height="28" rx="2" transform="rotate(45 50 24)" fill="white"/>
      <rect class="diamond" x="22" y="38" width="28" height="28" rx="2" transform="rotate(45 22 52)" fill="white"/>
      <rect class="diamond" x="78" y="38" width="28" height="28" rx="2" transform="rotate(45 78 52)" fill="white"/>
      <rect class="diamond" x="50" y="38" width="28" height="28" rx="2" transform="rotate(45 50 52)" fill="white"/>
    </svg>
  </div>

  <div class="title">Y-CORE</div>
  <div class="loading-text" id="loadingText">Loading...</div>

  <script>
    const loadingText = document.getElementById('loadingText')

    window.splash.onReady(() => {
      loadingText.textContent = 'Ready'
      loadingText.style.color = '#22c55e'
      document.body.classList.add('fade-out')
      setTimeout(() => window.close(), 400)
    })

    window.splash.onStatus((status, percent) => {
      loadingText.textContent = status
    })
  </script>
</body>
</html>
