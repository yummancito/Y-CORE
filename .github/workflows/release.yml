name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to release (e.g. v2.5.0)'
        required: true
        default: 'v2.5.0'

permissions:
  contents: write

jobs:
  release:
    name: Build & Publish Windows Installer
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build renderer + electron
        run: pnpm build

      - name: Verify build artifacts
        run: |
          if (!(Test-Path dist)) { Write-Error "dist/ not found"; exit 1 }
          if (!(Test-Path dist-electron)) { Write-Error "dist-electron/ not found"; exit 1 }

      - name: Publish to GitHub Releases (electron-builder)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm exec electron-builder --publish always
